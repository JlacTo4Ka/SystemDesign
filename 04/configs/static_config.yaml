components_manager:
    task_processors: # Task processor is an executor for coroutine tasks
        main-task-processor: # Make a task processor for CPU-bound coroutine tasks.
            worker_threads: $worker-threads # Process tasks in 4 threads.

        fs-task-processor: # Make a separate task processor for filesystem bound tasks.
            worker_threads: $worker-fs-threads

    default_task_processor: main-task-processor

    components: # Configuring components that were registered via component_list
        server:
            listener: # configuring the main listening socket...
                port: $server-port # ...to listen on this port and...
                task_processor: main-task-processor # ...process incoming requests on this task processor.

        logging:
            fs-task-processor: fs-task-processor
            loggers:
                default:
                    file_path: "@stderr"
                    level: $logger-level
                    overflow_behavior: discard # Drop logs if the system is too busy to write them down.

        # Dynamic config options. Cache is disabled, updates are disabled.
        dynamic-config:
            # For most of userver dynamic configs, defaults are used, some are overridden here.
            # See userver "dynamic config" docs for what configs exist.
            defaults:
                HTTP_CLIENT_CONNECTION_POOL_SIZE: 1000

        testsuite-support: {}

        congestion-control:

        http-client:
        http-client-core:
            load-enabled: $is-testing
            fs-task-processor: fs-task-processor

        dns-client:
            fs-task-processor: fs-task-processor

        tests-control:
            load-enabled: $is-testing
            path: /tests/{action}
            method: POST
            task_processor: main-task-processor

        handler-ping:
            path: /ping
            method: GET
            task_processor: main-task-processor
            throttling_enabled: false
            url_trailing_slash: strict-match

        handler-create-user:
            path: /v1/users
            method: POST
            task_processor: main-task-processor

        handler-get-user-by-login:
            path: /v1/users/by-login/{login}
            method: GET
            task_processor: main-task-processor

        handler-search-users:
            path: /v1/users/search
            method: GET
            task_processor: main-task-processor

        storage-component: {}

        postgres-db:
            dbconnection: $postgres-dsn
            blocking_task_processor: fs-task-processor
            dns_resolver: async

        handler-create-folder:
            path: /v1/folders
            method: POST
            task_processor: main-task-processor
            auth:
                types:
                - jwt-auth

        handler-get-folders:
            path: /v1/folders
            method: GET
            task_processor: main-task-processor

        handler-create-file:
            path: /v1/folders/{folder_id}/files
            method: POST
            task_processor: main-task-processor
            auth:
                types:
                - jwt-auth

        handler-get-file-by-name:
            path: /v1/files/by-name/{name}
            method: GET
            task_processor: main-task-processor

        handler-delete-file:
            path: /v1/files/{file_id}
            method: DELETE
            task_processor: main-task-processor
            auth:
                types:
                - jwt-auth

        handler-delete-folder:
            path: /v1/folders/{folder_id}
            method: DELETE
            task_processor: main-task-processor
            auth:
                types:
                - jwt-auth

        handler-login:
            path: /v1/auth/login
            method: POST
            task_processor: main-task-processor
        
        jwt-auth-checker:
            load-enabled: true
            secret: $jwt_secret_key
            secret#env: JWT_SECRET_KEY

        mongo-storage-component: {}

        mongo-folder-db:
            dbconnection: $mongo-dsn
            dns_resolver: async
            
        handler-mongo-create-folder:
            path: /v2/mongo/folders
            method: POST
            task_processor: main-task-processor
            auth:
                types:
                - jwt-auth

        handler-mongo-get-folders:
            path: /v2/mongo/folders
            method: GET
            task_processor: main-task-processor

        handler-mongo-delete-folder:
            path: /v2/mongo/folders/{folder_id}
            method: DELETE
            task_processor: main-task-processor
            auth:
                types:
                - jwt-auth
